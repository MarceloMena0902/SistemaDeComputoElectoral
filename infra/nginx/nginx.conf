events { worker_connections 1024; }

http {
  upstream vision_ai  { server vision-ai:8000; }
  upstream n8n_svc    { server n8n:5678; }

  server {
    listen 80;
    server_name _;

    # Vision-AI API
    location /api/ {
      proxy_pass http://vision_ai/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      client_max_body_size 20M;
    }

    # n8n webhooks
    location /webhook/ {
      proxy_pass http://n8n_svc/webhook/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # n8n UI
    location /n8n/ {
      proxy_pass http://n8n_svc/;
      proxy_set_header Host $host;
    }
  }
}
