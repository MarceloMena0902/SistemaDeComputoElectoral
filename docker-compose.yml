version: '3.9'

# =============================================================
#  Sistema Nacional de Cómputo Electoral - Bolivia
#  Stack: PostgreSQL · n8n · Vision-AI (Python) · Redis · pgAdmin
# =============================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ----------------------------------------------------------
  #  Base de datos principal (tolerante a fallos)
  # ----------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: electoral_postgres
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: electoral_db
      POSTGRES_USER: electoral_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Electoral2024!}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/migrations:/docker-entrypoint-initdb.d/migrations:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U electoral_user -d electoral_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - electoral_net
    shm_size: 256mb
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c effective_cache_size=1GB
        -c wal_level=replica
        -c synchronous_commit=on

  # ----------------------------------------------------------
  #  Redis - Cola de trabajos OCR y caché de resultados
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: electoral_redis
    restart: unless-stopped
    logging: *default-logging
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - electoral_net

  # ----------------------------------------------------------
  #  Servicio de Visión Artificial / OCR (Python + FastAPI)
  # ----------------------------------------------------------
  vision-ai:
    build:
      context: ./services/vision-ai
      dockerfile: Dockerfile
    container_name: electoral_vision_ai
    restart: unless-stopped
    logging: *default-logging
    environment:
      - DATABASE_URL=postgresql://electoral_user:${POSTGRES_PASSWORD:-Electoral2024!}@postgres:5432/electoral_db
      - REDIS_URL=redis://redis:6379/0
      - WORKERS=4
      - LOG_LEVEL=info
      - UPLOAD_DIR=/app/uploads
    volumes:
      - vision_uploads:/app/uploads
      - ./services/vision-ai:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - electoral_net
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  # ----------------------------------------------------------
  #  n8n - Orquestador de flujos / Automatización
  # ----------------------------------------------------------
  n8n:
    image: n8nio/n8n:latest
    container_name: electoral_n8n
    restart: unless-stopped
    logging: *default-logging
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-admin2024}
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n_db
      - DB_POSTGRESDB_USER=electoral_user
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-Electoral2024!}
      - N8N_LOG_LEVEL=info
      - EXECUTIONS_PROCESS=main
      - N8N_PAYLOAD_SIZE_MAX=32
      - GENERIC_TIMEZONE=America/La_Paz
    volumes:
      - n8n_data:/home/node/.n8n
      - ./automation/n8n/workflows:/home/node/.n8n/workflows:ro
    ports:
      - "5678:5678"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - electoral_net

  # ----------------------------------------------------------
  #  pgAdmin - Administración visual de PostgreSQL
  # ----------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: electoral_pgadmin
    restart: unless-stopped
    logging: *default-logging
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@electoral.bo}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin2024}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - electoral_net
    profiles:
      - tools

  # ----------------------------------------------------------
  #  Nginx - Reverse Proxy (producción)
  # ----------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: electoral_nginx
    restart: unless-stopped
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - vision-ai
      - n8n
    networks:
      - electoral_net
    profiles:
      - production

# ==============================================================
#  Volúmenes persistentes
# ==============================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  n8n_data:
    driver: local
  pgadmin_data:
    driver: local
  vision_uploads:
    driver: local

# ==============================================================
#  Red interna del stack
# ==============================================================
networks:
  electoral_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
