#--------------------------------------------------------------
# HAProxy - Alta Disponibilidad para PostgreSQL
# Sistema de Computo Oficial Electoral
#--------------------------------------------------------------

global
    daemon
    log stdout format raw local0 info
    maxconn 4096
    stats socket /var/run/haproxy.sock mode 660 level admin

defaults
    log     global
    mode    tcp
    option  tcplog
    option  dontlognull
    timeout connect  10s
    timeout client   60s
    timeout server   60s
    retries 3
    option  redispatch

#──────────────────────────────────────────────────────────────
# FRONTEND / BACKEND DE ESCRITURA (solo PRIMARY)
# Puerto 5000 → envia trafico SOLO al nodo que sea PRIMARY.
# HAProxy consulta GET /health en puerto 8008:
#   200 = PRIMARY  → acepta conexiones de escritura
#   503 = STANDBY  → marcado como backup (solo activo si primary cae)
#──────────────────────────────────────────────────────────────
frontend postgres_write_front
    bind *:5000
    mode tcp
    default_backend postgres_write_back

backend postgres_write_back
    mode tcp
    balance first
    option httpchk GET /health
    http-check expect status 200

    # Primary: activo siempre que retorne 200 en /health
    server pg-primary postgres-primary:5432 \
        check port 8008 inter 2000ms rise 2 fall 3

    # Standby: backup — solo recibe trafico si primary cae Y fue promovido
    server pg-standby postgres-standby:5432 \
        check port 8008 inter 2000ms rise 2 fall 3 backup

#──────────────────────────────────────────────────────────────
# FRONTEND / BACKEND DE LECTURA (cualquier nodo disponible)
# Puerto 5001 → balancea consultas READ entre primary y standby.
# Usa GET /alive que retorna 200 si PostgreSQL responde, sin
# importar si es primary o standby.
#──────────────────────────────────────────────────────────────
frontend postgres_read_front
    bind *:5001
    mode tcp
    default_backend postgres_read_back

backend postgres_read_back
    mode tcp
    balance roundrobin
    option httpchk GET /alive
    http-check expect status 200

    server pg-primary postgres-primary:5432 \
        check port 8008 inter 2000ms rise 2 fall 3
    server pg-standby postgres-standby:5432 \
        check port 8008 inter 2000ms rise 2 fall 3

#──────────────────────────────────────────────────────────────
# DASHBOARD DE ESTADISTICAS HAProxy
# http://localhost:7000/stats  |  user: admin  |  pass: computo2024
#──────────────────────────────────────────────────────────────
frontend stats_front
    bind *:7000
    mode http
    stats enable
    stats uri /stats
    stats refresh 5s
    stats auth admin:computo2024
    stats show-legends
    stats show-node
