<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formulario Oficial de Actas</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <section class="card">
      <div class="header">
        <h1>Registro Oficial de Actas</h1>
        <p>Cómputo Oficial - Automatización visual con Selenium</p>
      </div>

      <form id="official-form">
        <div class="grid">
          <label>
            Nro. Acta
            <input id="nro_acta" name="nro_acta" type="text" required />
          </label>

          <label>
            Código Territorial
            <input id="codigo_territorial" name="codigo_territorial" type="number" required />
          </label>

          <label>
            Código Mesa
            <input id="codigo_mesa" name="codigo_mesa" type="number" required />
          </label>

          <label>
            Nro. Mesa
            <input id="nro_mesa" name="nro_mesa" type="number" required />
          </label>

          <label>
            Nro. Votantes
            <input id="nro_votantes" name="nro_votantes" type="number" required />
          </label>

          <label>
            Registrado por
            <input id="registrado_por" name="registrado_por" type="number" value="1" required />
          </label>
        </div>

        <h2>Votos por partido</h2>

        <div class="grid">
          <label>
            Partido 1
            <input id="partido1" name="partido1" type="number" min="0" required />
          </label>

          <label>
            Partido 2
            <input id="partido2" name="partido2" type="number" min="0" required />
          </label>

          <label>
            Partido 3
            <input id="partido3" name="partido3" type="number" min="0" required />
          </label>

          <label>
            Partido 4
            <input id="partido4" name="partido4" type="number" min="0" required />
          </label>

          <label>
            Votos Blancos
            <input id="votos_blancos" name="votos_blancos" type="number" min="0" required />
          </label>

          <label>
            Votos Nulos
            <input id="votos_nulos" name="votos_nulos" type="number" min="0" required />
          </label>
        </div>

        <div class="summary">
          <p><strong>Votos válidos:</strong> <span id="votos_validos_preview">0</span></p>
          <p><strong>Total votos:</strong> <span id="total_votos_preview">0</span></p>
        </div>

        <button id="btn_registrar" type="submit">Registrar acta oficial</button>

        <div id="message" class="message"></div>
      </form>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
